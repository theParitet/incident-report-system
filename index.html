<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Incident Report System</title>
        <link rel="stylesheet" href="style.css" />

        <!-- jquery -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

        <!-- boostrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />

        <!-- cairo -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
            rel="stylesheet"
        />
    </head>
    <body data-bs-theme="dark">
        <div class="row m-2">
            <div class="container p-2 col-6 col-xxl-7 col-md-12 border rounded">
                <div
                    class="d-flex justify-content-between p-2 align-items-start"
                >
                    <h1>Incident Report System</h1>
                    <button
                        id="theme-picker"
                        class="btn btn-outline-secondary"
                        aria-label="Toggle theme"
                    >
                        <i id="theme-picker-icon" class="bi"></i>
                    </button>
                </div>
                <div id="table-space">
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-primary m-2">
                            Add incident
                        </button>
                        <div class="dropdown m-2">
                            <button
                                class="btn btn-outline-secondary dropdown-toggle"
                                type="button"
                                data-bs-toggle="dropdown"
                                data-bs-auto-close="outside"
                                aria-expanded="false"
                            >
                                Columns
                            </button>
                            <ul
                                class="dropdown-menu p-2"
                                style="min-width: 200px"
                            >
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="0"
                                        />Title</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="1"
                                        />Location</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="2"
                                            checked
                                        />Type</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="3"
                                            checked
                                        />Priority</label
                                    >
                                </li>

                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="4"
                                            checked
                                        />Status</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="5"
                                        />Reporter</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="6"
                                        />Data/time</label
                                    >
                                </li>
                                <li>
                                    <label
                                        class="dropdown-item d-flex align-items-center gap-2 mb-0"
                                    >
                                        <input
                                            class="form-check-input col-toggle"
                                            type="checkbox"
                                            data-col="7"
                                        />Description</label
                                    >
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="d-flex flex-column">
                        <table id="preview-data">
                            <thead>
                                <th>Title</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>something</th>
                            </thead>
                            <tbody>
                                <td>1</td>
                                <td>1</td>
                                <td>1</td>
                                <td>1</td>
                            </tbody>
                        </table>
                        <button class="btn btn-outline-primary m-2">
                            Extended View
                        </button>
                    </div>
                </div>
            </div>
            <div
                class="container col-6 col-xxl-5 col-md-12 border rounded p-2"
            >
                <div class="p-2">
                    <h1>Data Dashboard</h1>
                </div>

                <div class="p-2">
                    <select class="form-select" aria-label="Time period filter">
                        <option selected>Time period</option>
                        <option value="1d">1 Day</option>
                        <option value="7d">7 Days</option>
                        <option value="1m">1 Month</option>
                        <option value="6m">6 Months</option>
                        <option value="1y">1 year</option>
                        <option value="2y">2 year</option>
                    </select>
                </div>

                <div class="row g-2 p-2">
                    <div class="col-6 col-lg-3">
                        <div class="card text-center h-100">
                            <div class="card-body py-3">
                                <div class="text-secondary small">
                                    Total Incidents
                                </div>
                                <div class="fs-2 fw-bold" id="kpi-total">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="card text-center h-100">
                            <div class="card-body py-3">
                                <div class="text-secondary small">
                                    Critical Incidents
                                </div>
                                <div
                                    class="fs-2 fw-bold text-danger"
                                    id="kpi-critical"
                                >
                                    0
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="card text-center h-100">
                            <div class="card-body py-3">
                                <div class="text-secondary small">
                                    Active Incidents
                                </div>
                                <div
                                    class="fs-2 fw-bold text-warning"
                                    id="kpi-active"
                                >
                                    0
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="card text-center h-100">
                            <div class="card-body py-3">
                                <div class="text-secondary small">Resolved</div>
                                <div
                                    class="fs-2 fw-bold text-success"
                                    id="kpi-resolved"
                                >
                                    0
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-2">
                    <ul class="nav nav-tabs" id="dashboard-tabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link active"
                                id="map-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#map-pane"
                                type="button"
                                role="tab"
                                aria-controls="map-pane"
                                aria-selected="true"
                            >
                                Map
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="pie-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#pie-pane"
                                type="button"
                                role="tab"
                                aria-controls="pie-pane"
                                aria-selected="false"
                            >
                                Pie
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link"
                                id="timeline-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#timeline-pane"
                                type="button"
                                role="tab"
                                aria-controls="timeline-pane"
                                aria-selected="false"
                            >
                                Timeline
                            </button>
                        </li>
                    </ul>
                    <div
                        class="tab-content border border-top-0 rounded-bottom p-3"
                        id="dashboard-tab-content"
                    >
                        <div
                            class="tab-pane show active"
                            id="map-pane"
                            role="tabpanel"
                            aria-labelledby="map-tab"
                        >
                            <div
                                id="map"
                                class="d-flex align-items-center justify-content-center bg-light text-dark rounded"
                            >
                                Map
                            </div>
                        </div>
                        <div
                            class="tab-pane"
                            id="pie-pane"
                            role="tabpanel"
                            aria-labelledby="pie-tab"
                        >
                            <div
                                id="pie-chart"
                                class="d-flex align-items-center justify-content-center bg-light text-dark rounded"
                            >
                                Pie
                            </div>
                        </div>
                        <div
                            class="tab-pane"
                            id="timeline-pane"
                            role="tabpanel"
                            aria-labelledby="timeline-tab"
                        >
                            <div
                                id="timeline-chart"
                                class="d-flex align-items-center justify-content-center bg-light text-dark rounded"
                            >
                                Timeline
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <!-- own -->
        <script type="module" src="script.js"></script>
    </body>
</html>
